services:
  postgres:
    image: postgres:16
    container_name: bitbite-postgres
    environment:
      POSTGRES_DB: bitbite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bitbite-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bitbite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bitbite-postgres-data:
