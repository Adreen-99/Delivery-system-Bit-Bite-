services:
  - type: web
    name: bit-bite-api
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python manage_db.py && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bit-bite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://delivery-system-bit-bite.vercel.app
      - key: LNBITS_URL
        value: https://demo.lnbits.com
      - key: LNBITS_ADMIN_KEY
        sync: false
      - key: LNBITS_INVOICE_KEY
        sync: false
      - key: LNBITS_WEBHOOK_SECRET
        sync: false
    healthCheckPath: /api/health

databases:
  - name: bit-bite-db
    region: oregon
    plan: free
    databaseName: bitbite
    user: bitbite
